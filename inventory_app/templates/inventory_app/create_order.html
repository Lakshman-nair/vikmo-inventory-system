<!DOCTYPE html>
<html>

<head>

<title>Create Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.order-card{
max-width:900px;
margin:auto;
margin-top:40px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow order-card">

<div class="card-header bg-primary text-white">

<h4>Create Dealer Order</h4>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<!-- Dealer -->

<div class="mb-4">

<label class="form-label"><b>Select Dealer</b></label>

<select name="dealer" class="form-control" required>

<option value="">Choose Dealer</option>

{% for dealer in dealers %}

<option value="{{ dealer.id }}">
{{ dealer.name }} | {{ dealer.email }}
</option>

{% endfor %}

</select>

</div>


<hr>


<h5>Product</h5>

<div class="row">

<div class="col-md-4">

<label>Product</label>

<select name="product[]" class="form-control product-select" required>

<option value="">Select Product</option>

{% for product in products %}

<option value="{{ product.id }}" data-price="{{ product.price }}">
{{ product.name }}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-3">

<label>Unit Price</label>

<input type="number" name="price[]" class="form-control price" readonly>

</div>


<div class="col-md-2">

<label>Quantity</label>

<input type="number" name="quantity[]" class="form-control quantity" required>

</div>


<div class="col-md-3">

<label>Line Total</label>

<input type="number" name="line_total[]" class="form-control total" readonly>

</div>

</div>


<hr>


<h4>Total Amount: ₹ <span id="grand-total">0</span></h4>


<button class="btn btn-success mt-3">

Confirm Order

</button>


<a href="/" class="btn btn-secondary mt-3">

Back

</a>


</form>

</div>

</div>

</div>



<script>

function updateTotals(){

let qty=document.querySelector(".quantity").value || 0;
let price=document.querySelector(".price").value || 0;

let total=qty*price;

document.querySelector(".total").value=total;

document.getElementById("grand-total").innerText=total;

}


document.querySelector(".product-select").addEventListener("change",function(){

let price=this.options[this.selectedIndex].dataset.price;

document.querySelector(".price").value=price;

updateTotals();

});


document.querySelector(".quantity").addEventListener("keyup",function(){

updateTotals();

});

</script>

</body>
</html>

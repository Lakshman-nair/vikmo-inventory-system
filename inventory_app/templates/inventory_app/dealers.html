<!DOCTYPE html>
<html>
<head>
<title>Dealers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2>Dealers</h2>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

{% for dealer in dealers %}

<tr>
<td>{{ dealer.name }}</td>
<td>{{ dealer.email }}</td>
<td>{{ dealer.phone }}</td>
</tr>

{% empty %}

<tr>
<td colspan="3">No dealers available</td>
</tr>

{% endfor %}

</table>

<a href="/" class="btn btn-secondary">Back</a>

</body>
</html>
